<section class="card">
  <h3>发布 Plan</h3>
  <form method="post" action="/teams/{{.TeamID}}/r/plan-exchange/messages">
    <input type="hidden" name="channel_id" value="{{.ChannelID}}">
    <input type="hidden" name="kind" value="plan">
    <input type="text" name="author_agent_id" value="{{.ActorAgentID}}" placeholder="author_agent_id">
    <input type="text" name="title" placeholder="标题">
    <textarea name="goal" placeholder="目标"></textarea>
    <textarea name="steps" placeholder="步骤（每行一条）"></textarea>
    <textarea name="interfaces" placeholder="接口（每行一条）"></textarea>
    <textarea name="ready_for" placeholder="ready_for（每行一个 agent id）"></textarea>
    <textarea name="abandoned" placeholder="放弃方案（option :: reason，每行一条）"></textarea>
    <button type="submit">发布 Plan</button>
  </form>
</section>
